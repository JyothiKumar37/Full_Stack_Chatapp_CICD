version: "3.7"

services:
  mongodb:
    image: mongo:7
    container_name: chatapp-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-mongoadmin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-secret}
    volumes:
      - mongo-data:/data/db
    networks:
      - chatapp
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
    container_name: chatapp-backend
    # Retries until MongoDB is accepting connections (compose has no
    # cross-version "wait for healthy" that works on old + new CLIs).
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5001
      MONGODB_URI: mongodb://${MONGO_USERNAME:-mongoadmin}:${MONGO_PASSWORD:-secret}@mongodb:27017/chatapp?authSource=admin
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in your .env file}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:8080}
    expose:
      - "5001"
    depends_on:
      - mongodb
    networks:
      - chatapp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    container_name: chatapp-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - chatapp

networks:
  chatapp:
    driver: bridge

volumes:
  mongo-data:
